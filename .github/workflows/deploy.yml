name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /home/ubuntu/github-review-bot
            git pull origin main
            docker build -t github-review-bot .
            docker rm -f github-review-bot
            docker run -d --name github-review-bot --env-file .env -p 8000:8000 -v /home/ubuntu/github-review-bot/private-key.pem:/app/private-key.pem --restart unless-stopped github-review-bot
